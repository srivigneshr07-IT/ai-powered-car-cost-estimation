<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDS Database Viewer - Market Prices</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
        }
        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-box:hover {
            transform: translateY(-5px);
        }
        .stat-box h3 {
            color: #666;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
        }
        .stat-box p {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .filter-box {
            padding: 20px 30px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        .filter-box h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        input, select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        button.clear {
            background: #6c757d;
        }
        button.clear:hover {
            background: #5a6268;
        }
        .table-container {
            overflow-x: auto;
            padding: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 500;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .brand {
            font-weight: 600;
            color: #333;
        }
        .price {
            color: #28a745;
            font-weight: 600;
        }
        .fresh {
            color: #28a745;
            font-weight: 600;
        }
        .old {
            color: #dc3545;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-cars24 {
            background: #e3f2fd;
            color: #1976d2;
        }
        .badge-cardekho {
            background: #fff3e0;
            color: #f57c00;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗄️ AWS RDS Database Viewer</h1>
            <p>Database: <strong>car_valuation</strong> | Host: <strong>database-1.cgp62acck1rv.us-east-1.rds.amazonaws.com</strong></p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3>Total Listings</h3>
                <p id="totalListings">-</p>
            </div>
            <div class="stat-box">
                <h3>Fresh (24h)</h3>
                <p id="freshListings">-</p>
            </div>
            <div class="stat-box">
                <h3>Cities</h3>
                <p id="totalCities">-</p>
            </div>
            <div class="stat-box">
                <h3>Brands</h3>
                <p id="totalBrands">-</p>
            </div>
            <div class="stat-box">
                <h3>Avg Price</h3>
                <p id="avgPrice">-</p>
            </div>
        </div>

        <div class="filter-box">
            <h3>🔍 Filters</h3>
            <div class="filters">
                <input type="text" id="brandFilter" placeholder="Search by brand..." onkeyup="applyFilters()">
                <input type="text" id="cityFilter" placeholder="Search by city..." onkeyup="applyFilters()">
                <select id="sourceFilter" onchange="applyFilters()">
                    <option value="">All Sources</option>
                    <option value="cars24">Cars24</option>
                    <option value="cardekho">CarDekho</option>
                </select>
                <input type="number" id="minPrice" placeholder="Min price (optional)" onkeyup="applyFilters()">
                <input type="number" id="maxPrice" placeholder="Max price (optional)" onkeyup="applyFilters()">
                <button class="clear" onclick="clearFilters()">Clear All</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Brand</th>
                        <th>Model</th>
                        <th>Year</th>
                        <th>Price</th>
                        <th>Kilometers</th>
                        <th>City</th>
                        <th>Source</th>
                        <th>Last Seen</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" class="no-data">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let filteredData = [];

        function init() {
            if (typeof allData === 'undefined') {
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="9" class="no-data">Error: Data file not found. Make sure data.js is in the same folder.</td></tr>';
                return;
            }
            
            filteredData = allData;
            updateStats();
            displayData(filteredData);
        }

        function updateStats() {
            document.getElementById('totalListings').textContent = allData.length;
            
            const now = new Date();
            const oneDayAgo = new Date(now - 24*60*60*1000);
            const fresh = allData.filter(d => new Date(d.lastSeen) > oneDayAgo).length;
            document.getElementById('freshListings').textContent = fresh;
            
            const cities = new Set(allData.map(d => d.city));
            document.getElementById('totalCities').textContent = cities.size;
            
            const brands = new Set(allData.map(d => d.brand));
            document.getElementById('totalBrands').textContent = brands.size;
            
            const avgPrice = Math.round(allData.reduce((sum, d) => sum + d.price, 0) / allData.length);
            document.getElementById('avgPrice').textContent = '₹' + avgPrice.toLocaleString();
        }

        function displayData(data) {
            const tbody = document.getElementById('tableBody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="no-data">No listings found matching your filters.</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            
            data.forEach(row => {
                const tr = document.createElement('tr');
                
                const now = new Date();
                const oneDayAgo = new Date(now - 24*60*60*1000);
                const isFresh = new Date(row.lastSeen) > oneDayAgo;
                
                tr.innerHTML = `
                    <td>${row.id}</td>
                    <td class="brand">${row.brand}</td>
                    <td>${row.model}</td>
                    <td>${row.year}</td>
                    <td class="price">₹${row.price.toLocaleString()}</td>
                    <td>${row.kilometers.toLocaleString()} km</td>
                    <td>${row.city}</td>
                    <td><span class="badge badge-${row.source}">${row.source}</span></td>
                    <td class="${isFresh ? 'fresh' : 'old'}">${row.lastSeen.substring(0, 19)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function applyFilters() {
            const brandFilter = document.getElementById('brandFilter').value.toLowerCase();
            const cityFilter = document.getElementById('cityFilter').value.toLowerCase();
            const sourceFilter = document.getElementById('sourceFilter').value;
            const minPrice = parseInt(document.getElementById('minPrice').value) || 0;
            const maxPrice = parseInt(document.getElementById('maxPrice').value) || Infinity;

            filteredData = allData.filter(row => {
                const matchBrand = !brandFilter || row.brand.toLowerCase().includes(brandFilter);
                const matchCity = !cityFilter || row.city.toLowerCase().includes(cityFilter);
                const matchSource = !sourceFilter || row.source === sourceFilter;
                const matchPrice = row.price >= minPrice && row.price <= maxPrice;
                return matchBrand && matchCity && matchSource && matchPrice;
            });

            displayData(filteredData);
        }

        function clearFilters() {
            document.getElementById('brandFilter').value = '';
            document.getElementById('cityFilter').value = '';
            document.getElementById('sourceFilter').value = '';
            document.getElementById('minPrice').value = '';
            document.getElementById('maxPrice').value = '';
            filteredData = allData;
            displayData(filteredData);
        }

        // Initialize on page load
        window.onload = init;
    </script>
</body>
</html>
